<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLEMENT | Archive Generator</title>
    <style>
        :root {
            --bg: #050505;
            --text: #fff;
            --accent: #fff;
            --font: "Times New Roman", Times, serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: var(--font); 
            padding: 60px 10%; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 800px; }
        
        header { border-bottom: 1px solid #222; padding-bottom: 20px; margin-bottom: 40px; }
        .label { font-size: 0.7rem; letter-spacing: 4px; color: #555; text-transform: uppercase; }
        h1 { font-size: 2.5rem; font-weight: 400; margin-top: 10px; }

        form { display: flex; flex-direction: column; gap: 30px; }
        .input-group { display: flex; flex-direction: column; gap: 10px; }
        label { font-size: 0.9rem; color: #888; font-style: italic; }
        
        input, textarea {
            background: #0a0a0a; border: 1px solid #222; color: #fff;
            padding: 15px; font-family: var(--font); font-size: 1.1rem; outline: none;
        }
        input:focus, textarea:focus { border-color: #555; }
        textarea { min-height: 250px; line-height: 1.6; }

        .gen-btn {
            background: #fff; color: #000; border: none; padding: 20px;
            font-family: var(--font); font-weight: bold; letter-spacing: 2px;
            cursor: pointer; transition: 0.3s;
        }
        .gen-btn:hover { background: #ccc; }

        /* Instructions Area */
        .manifest-box {
            margin-top: 50px; padding: 30px; background: #0a0a0a; border: 1px solid #111;
            display: none; flex-direction: column; gap: 15px;
        }
        .manifest-code { background: #000; padding: 15px; color: #00ff88; font-family: monospace; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="label">Archive Generator // IFS 740</div>
            <h1>Create New Entry</h1>
        </header>

        <form id="generator-form">
            <div class="input-group">
                <label>Article Title</label>
                <input type="text" id="title" placeholder="e.g. Information Strategy in 2024" required>
            </div>

            <div class="input-group">
                <label>Category</label>
                <input type="text" id="category" placeholder="e.g. RESEARCH / TECH" required>
            </div>

            <div class="input-group">
                <label>YouTube Video URL</label>
                <input type="url" id="videoUrl" placeholder="https://www.youtube.com/watch?v=..." required>
            </div>

            <div class="input-group">
                <label>Journal Content</label>
                <textarea id="content" placeholder="Type your narrative here..." required></textarea>
            </div>

            <button type="submit" class="gen-btn">GENERATE JSON FILE</button>
        </form>

        <!-- Dynamic Instructions -->
        <div id="manifest-box" class="manifest-box">
            <p class="label" style="color:#fff">Next Steps:</p>
            <p style="font-size: 0.9rem; color: #888;">1. The file has been downloaded. Move it into your <b>/posts/</b> folder.</p>
            <p style="font-size: 0.9rem; color: #888;">2. Copy the line below and paste it into the <b>POST_FILES</b> array in your <b>main.js</b>:</p>
            <div id="manifest-code" class="manifest-code"></div>
        </div>
    </div>

    <script>
        const form = document.getElementById('generator-form');
        const manifestBox = document.getElementById('manifest-box');
        const manifestCode = document.getElementById('manifest-code');

        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const title = document.getElementById('title').value;
            const category = document.getElementById('category').value;
            const videoUrl = document.getElementById('videoUrl').value;
            const content = document.getElementById('content').value;

            // Create a filename "slug" from the title (e.g., "my-article.json")
            const filename = title.toLowerCase().replace(/[^a-z0-9]/g, '-') + ".json";

            const postData = {
                title: title,
                category: category,
                videoUrl: videoUrl,
                content: content
            };

            // 1. Create the Blob (The file content)
            const jsonString = JSON.stringify(postData, null, 4);
            const blob = new Blob([jsonString], { type: "application/json" });
            
            // 2. Trigger Download
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();

            // 3. Show Instructions
            manifestBox.style.display = "flex";
            manifestCode.innerText = `"${filename}",`;
            
            // Scroll to instructions
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        });
    </script>
</body>
</html>
